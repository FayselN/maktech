name: Flutter CI

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'app/**'
      - '.github/workflows/flutter_ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'app/**'
      - '.github/workflows/flutter_ci.yml'

jobs:
  analyze_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            app/.dart_tool
            app/.packages
            app/pubspec.lock
          key: flutter-${{ runner.os }}-${{ hashFiles('app/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze

      - name: Run tests
        run: flutter test
