name: Flutter Release Build

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Version name (e.g. 1.0.1)'
        required: true
        type: string
      build_number:
        description: 'Build number (e.g. 2)'
        required: true
        type: string

jobs:
  build_aab:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build release AAB
        run: flutter build appbundle --release
          --build-name=${{ inputs.build_name }}
          --build-number=${{ inputs.build_number }}
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_FILE: ${{ secrets.KEY_STORE_FILE }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: maktech-release-${{ inputs.build_name }}+${{ inputs.build_number }}
          path: app/build/app/outputs/bundle/release/app-release.aab
